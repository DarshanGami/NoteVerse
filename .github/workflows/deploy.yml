name: Build & Deploy to Render

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build & verify backend ──────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        working-directory: backend
        run: mvn clean package -DskipTests
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

  # ── 2. Build & verify frontend ─────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

  # ── 3. Deploy backend to Render ────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -s "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -X POST \
            -d '' \
            --fail \
            && echo "Backend deploy triggered"

  # ── 4. Deploy frontend to Render ───────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Trigger Render frontend deploy
        run: |
          curl -s "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -X POST \
            -d '' \
            --fail \
            && echo "Frontend deploy triggered"
