services:
  # ── Backend ─────────────────────────────────────────────
  - type: web
    name: noteverse-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend ─────────────────────────────────────────────
  - type: web
    name: noteverse-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
