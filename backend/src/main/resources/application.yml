spring:
  application:
    name: noteverse-backend
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: noteverse
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}
  frontend-url: ${FRONTEND_URL}
  cors:
    allowed-origins: ${FRONTEND_URL}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
